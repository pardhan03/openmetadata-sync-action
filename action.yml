name: 'OpenMetadata Metadata Sync'
description: 'Automatically sync schema changes (dbt, SQL, JSON Schema) to OpenMetadata on every PR'
author: 'Your Name'

branding:
  icon: 'database'
  color: 'blue'

inputs:
  openmetadata_host:
    description: 'Your OpenMetadata instance URL (e.g. http://localhost:8585)'
    required: true

  openmetadata_token:
    description: 'JWT API token for OpenMetadata authentication'
    required: true

  github_token:
    description: 'GitHub token used to post PR comments (use secrets.GITHUB_TOKEN)'
    required: true

  schema_path:
    description: 'Path to your schema/dbt/SQL files inside the repo'
    required: false
    default: '.'

  database_service_name:
    description: 'The name of the Database Service in OpenMetadata to update'
    required: true

  post_pr_comment:
    description: 'Whether to post a summary comment on the PR (true/false)'
    required: false
    default: 'true'
  pr_number:
    description: 'PR number for posting comments'
    required: false

  dry_run:
    description: 'If true, only logs what would change without actually updating OpenMetadata'
    required: false
    default: 'false'

outputs:
  tables_updated:
    description: 'Number of tables updated in OpenMetadata'

  columns_updated:
    description: 'Number of columns updated in OpenMetadata'

  changes_detected:
    description: 'Whether any metadata changes were detected (true/false)'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    OM_HOST: ${{ inputs.openmetadata_host }}
    OM_TOKEN: ${{ inputs.openmetadata_token }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
    SCHEMA_PATH: ${{ inputs.schema_path }}
    DB_SERVICE_NAME: ${{ inputs.database_service_name }}
    POST_PR_COMMENT: ${{ inputs.post_pr_comment }}
    DRY_RUN: ${{ inputs.dry_run }}
    PR_NUMBER: ${{ inputs.pr_number }}